name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos-vst3:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build VST3 Bundle
        run: cargo xtask bundle sendspin-vst3 --release

      - name: Package Bundle
        run: |
          cd target/bundled
          ditto -c -k --sequesterRsrc --keepParent "Sendspin VST3.vst3" "Sendspin-VST3-${GITHUB_REF_NAME}-macos.zip"

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sendspin-vst3-macos
          path: target/bundled/Sendspin-VST3-${{ github.ref_name }}-macos.zip

      - name: Publish Release Asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: target/bundled/Sendspin-VST3-${{ github.ref_name }}-macos.zip
