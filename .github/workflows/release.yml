name: Release

on:
  release:
    types:
      - published

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event.release.tag_name }}

jobs:
  build-macos-vst3:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set Build Version From Tag
        run: echo "SENDSPIN_BUILD_VERSION=${RELEASE_TAG#v}" >> "$GITHUB_ENV"

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build VST3 Bundle
        run: cargo xtask bundle sendspin-vst --release

      - name: Package Bundle
        run: |
          cd target/bundled
          ditto -c -k --sequesterRsrc --keepParent "Sendspin.vst3" "Sendspin-VST-${RELEASE_TAG}-macos.zip"

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sendspin-vst-macos
          path: target/bundled/Sendspin-VST-${{ env.RELEASE_TAG }}-macos.zip

  build-windows-vst3:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set Build Version From Tag
        shell: pwsh
        run: |
          $version = $env:RELEASE_TAG
          if ($version.StartsWith("v")) { $version = $version.Substring(1) }
          "SENDSPIN_BUILD_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~\.cargo\registry
            ~\.cargo\git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build VST3 Bundle
        run: cargo xtask bundle sendspin-vst --release

      - name: Package Bundle
        shell: pwsh
        run: |
          $zipPath = "target/bundled/Sendspin-VST-$env:RELEASE_TAG-windows.zip"
          if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
          Compress-Archive -Path "target/bundled/Sendspin.vst3" -DestinationPath $zipPath

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sendspin-vst-windows
          path: target/bundled/Sendspin-VST-${{ env.RELEASE_TAG }}-windows.zip

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - build-macos-vst3
      - build-windows-vst3

    steps:
      - name: Download macOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: sendspin-vst-macos
          path: release-assets/macos

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: sendspin-vst-windows
          path: release-assets/windows

      - name: Publish Release Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          overwrite_files: true
          files: |
            release-assets/macos/Sendspin-VST-${{ env.RELEASE_TAG }}-macos.zip
            release-assets/windows/Sendspin-VST-${{ env.RELEASE_TAG }}-windows.zip
